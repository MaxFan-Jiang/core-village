name: 檢查村民資料

# 每個碰到 villagers/ 或 scripts/ 的 PR 都會自動跑這個檢查。
# 綠燈 = 你的卡格式正確，可以被 merge；紅燈 = 點進去看中文錯誤訊息，改好再 push。
on:
  pull_request:        # 每個 PR 都跑，讓貢獻者都看到清楚的綠燈／紅燈
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 驗證所有 villagers/*.json
        run: node scripts/build-villagers.mjs --check
